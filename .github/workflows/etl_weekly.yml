name: ETL Mingguan

on:
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas sqlalchemy psycopg2-binary numpy

      - name: Run ETL
        run: python etl_runner.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
